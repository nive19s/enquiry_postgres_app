<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <!-- Logo/Brand Section -->
      <div class="login-header">
        <div class="logo-circle">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue to Enquiry Management</p>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <!-- Login Form -->
      <form class="login-form">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </span>
            <input type="email" id="email" class="form-input" placeholder="Enter your email"
              [(ngModel)]="loginObj.email" name="email" [disabled]="isLoading" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </span>
            <input type="password" id="password" class="form-input" placeholder="Enter your password"
              [(ngModel)]="loginObj.password" name="password" [disabled]="isLoading" autocomplete="current-password" required>
          </div>
        </div>

        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" id="remember" [(ngModel)]="agreeToTerms" name="agreeToTerms">
            <span class="checkmark"></span>
            <span class="checkbox-label">I agree to the Terms & Conditions</span>
          </label>
          <a href="#" class="forgot-password">Forgot Password?</a>
        </div>

        <button type="button" class="btn-login" (click)="onLogin()" [disabled]="isLoading || !agreeToTerms">
          {{ isLoading ? 'Signing In...' : 'Sign In' }}
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>

        <!-- Divider -->
        <div class="divider">
          <span>OR</span>
        </div>
        
        <div class="social-login">
        <!-- Google Sign-In Button -->
        <asl-google-signin-button 
          type="standard"
          size="large"
          text="signin_with"
          shape="rectangular"
          theme="outline"
          logo_alignment="left">
        </asl-google-signin-button>

        <!-- Microsoft Sign-In Button -->
        <button (click)="loginWithMicrosoft()" class="ms-login-btn">
          <svg width="20" height="20" viewBox="0 0 24 24"
           xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
          <span>
            Login with Microsoft
          </span>
        </button>
        </div>

      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>Don't have an account? <a routerLink="/signup">Sign up</a></p>
      </div>
    </div>

    <!-- Decorative Elements -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
  </div>
</div>
