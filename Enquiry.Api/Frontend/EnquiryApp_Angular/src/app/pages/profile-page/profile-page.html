<div class="profile-wrapper">
  <div class="profile-container">
    <div class="profile-card">
      <!-- Header Section -->
      <div class="profile-header">
        <div class="logo-circle">
          @if(user?.profileImage){
            <img [src]="user?.profileImage" alt="Profile" class="profile-img" style="width: 100%; height: 100%; object-fit: cover; border-radius: 50%;">
          }@else  {
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          }
        </div>
        <h1>User Profile</h1>
        <p class="subtitle">Your personal information and settings</p>
      </div>

      @if(user) {
        <!-- Profile Information -->
        <div class="profile-info">
          <!-- Full Name -->
          <div class="info-item">
            <div class="info-label">
              <span class="info-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </span>
              <label>Full Name</label>
            </div>
            <div class="info-value">{{user.fullName}}</div>
          </div>

          <!-- Email -->
          <div class="info-item">
            <div class="info-label">
              <span class="info-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
              </span>
              <label>Email Address</label>
            </div>
            <div class="info-value">{{user.email}}</div>
          </div>

          <!-- Role -->
          <div class="info-item">
            <div class="info-label">
              <span class="info-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                  <circle cx="9" cy="7" r="4"></circle>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
              </span>
              <label>Role</label>
            </div>
            <div class="info-value">
              <span class="role-badge" [class.admin]="user.role === 'Admin'" [class.user]="user.role === 'User'">
                {{user.role}}
              </span>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="profile-actions">
          <button class="btn-secondary" routerLink="/edit-profile">
            Edit Profile
          </button>
        </div>
      } @else {
        <div class="no-data">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <p>No user data available</p>
        </div>
      }
    </div>

    <!-- Decorative Elements -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
  </div>
</div>
