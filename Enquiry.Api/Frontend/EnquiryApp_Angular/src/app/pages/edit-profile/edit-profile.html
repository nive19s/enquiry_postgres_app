<div class="edit-wrapper">
  <div class="edit-container">
    <div class="edit-card">
      <h2>Edit User Profile</h2>
      
      <form (ngSubmit)="onSubmit()" #profileForm="ngForm">
        
        <!-- Profile Image Upload -->
        <div class="image-upload-section">
          <div class="image-preview">
            @if(formData.profileImage) {
              <img [src]="formData.profileImage" alt="Profile Preview">
            } @else {
              <div class="placeholder-icon">
                <!-- Simple Upload Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21.2 15c.7-1.2 1-2.5 1-3.9 0-4.4-3.6-8-8-8-4.4 0-8 3.6-8 8 0 1.4.3 2.7 1 3.9" />
                  <path d="M4.5 16.9c-1.9 1.8-3 4.4-3 7.1" />
                  <path d="M22.5 16.9c1.9 1.8 3 4.4 3 7.1" />
                  <circle cx="12" cy="12" r="3" />
                  <path d="M12 9v6" />
                  <path d="M9 12h6" />
                </svg>
              </div>
            }
          </div>
          
          <label class="upload-btn">
            Change Photo
            <input type="file" (change)="onFileSelected($event)" accept="image/*" hidden>
          </label>
        </div>

        <!-- Full Name Input -->
        <div class="form-group">
          <label for="fullName">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            [(ngModel)]="formData.fullName" 
            required
            class="form-control"
            placeholder="Unknown identity">
        </div>

        <!-- Error Message -->
        @if(errorMessage) {
          <div class="error-message" style="color: #e53e3e; text-align: center; margin-bottom: 10px;">{{errorMessage}}</div>
        }

        <!-- Actions -->
        <div class="button-group">
          <button type="button" class="btn-cancel" (click)="onCancel()">Cancel</button>
          <button type="submit" class="btn-save" [disabled]="isLoading || !profileForm.form.valid">
            @if(isLoading) {
              Saving...
            } @else {
              Save Changes
            }
          </button>
        </div>

      </form>
    </div>

    <!-- Decoration Elements -->
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
  </div>
</div>
